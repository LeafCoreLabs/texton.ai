# Production overrides — internalize backend and infrastructure ports.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# Requires .env with JWT_SECRET, ENCRYPTION_KEY, SUPERUSER_PASSWORD, POSTGRES_PASSWORD, and API keys.

services:
  postgres:
    image: postgres:16-alpine
    container_name: texton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-texton}
      POSTGRES_USER: ${POSTGRES_USER:-texton}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - texton-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-texton} -d ${POSTGRES_DB:-texton}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    ports: !reset []
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
      tika-server:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker,prod
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-texton}
      POSTGRES_DB: ${POSTGRES_DB:-texton}
      POSTGRES_HOST: postgres
      TEXTON_CORS_ORIGINS: ${TEXTON_CORS_ORIGINS:-https://localhost}

  frontend:
    build:
      context: ./frontend
      args:
        NGINX_CONF: nginx.prod.conf
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro

  chromadb:
    ports: !reset []

  tika-server:
    ports: !reset []

  garage:
    ports: !reset []

volumes:
  postgres-data:
