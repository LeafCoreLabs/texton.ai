server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 250MB
      max-request-size: 260MB
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:texton}
    username: ${POSTGRES_USER:texton}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

gemini:
  api-key: ${GEMINI_API_KEY:}

groq:
  api-key: ${GROQ_API_KEY:}
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      access-expiration: 900000
      refresh-expiration-days: 7

services:
  apache-tika:
    url: http://tika-server:9998

ai:
  chromadb:
    url: http://chromadb:8000
    collection: user-document-embeddings

texton:
  security:
    cookie-secure: true
    access-token-max-age-seconds: 900
    refresh-token-max-age-seconds: 604800
    guest-chat-limit-per-hour: 20
    auth-chat-limit-per-hour: 200
    cors-origins: ${TEXTON_CORS_ORIGINS:https://localhost}
  encryption:
    key: ${ENCRYPTION_KEY}
  indexing:
    max-upload-mb: 250
    max-pages: 6000
    max-chunks-per-document: 10000
    chunk-target-chars: 3200
    chunk-overlap-chars: 280
    query-retrieve-k: 56
    query-final-k: 18
    study-retrieve-k: 64
    study-final-k: 20
    min-retrieval-confidence: 0.18
    embedding-batch-size: 10
    min-page-chars: 25
