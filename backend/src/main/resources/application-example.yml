# Copy to application.yml for local runs (application.yml is gitignored)

server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  datasource:
    url: jdbc:h2:file:./data/texton
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update

groq:
  api-key: ${GROQ_API_KEY:}
  model: llama-3.3-70b-versatile

gemini:
  api-key: ${GEMINI_API_KEY:}

application:
  security:
    jwt:
      secret-key: your-jwt-secret-min-32-chars
      expiration: 86400000
